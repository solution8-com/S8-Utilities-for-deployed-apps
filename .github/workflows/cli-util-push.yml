name: Auto-Update README with GPT-5-mini

on:
  push:
    branches:
      - main
    paths:
      - "cli-utilities/.zshrc"
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read .zshrc (truncate to 20k)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p cli-utilities

          if [[ -f "cli-utilities/.zshrc" ]]; then
            head -c 20000 "cli-utilities/.zshrc" > "zshrc.txt"
          else
            printf '%s\n' 'No .zshrc found at cli-utilities/.zshrc' > "zshrc.txt"
          fi

      - name: Generate README via GitHub Models (gpt-5-mini)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");

            const zshrc = fs.readFileSync("zshrc.txt", "utf8");

            const prompt =
              "You are documenting zsh utility functions.\n\n" +
              "ZSHRC CONTENT:\n" +
              zshrc +
              "\n\n" +
              "Create a COMPLETE README.md containing:\n" +
              "1. QUICK START setup instructions\n" +
              "2. Function list with one-line descriptions\n" +
              "3. Usage examples for each function\n" +
              "4. Prerequisites if required\n\n" +
              "Focus strictly on functions defined in the file.\n" +
              "Output clean Markdown only.\n";

            const res = await github.request(
              "POST https://models.github.ai/inference/gpt-5-mini",
              {
                headers: {
                  "x-github-api-version": "2022-11-28",
                },
                model: "gpt-5-mini",
                messages: [{ role: "user", content: prompt }],
                temperature: 0.1,
                max_tokens: 2000,
              }
            );

            const readme =
              res?.data?.choices?.[0]?.message?.content ||
              "# CLI Utilities\n\nREADME generation failed (no content returned).\n";

            fs.writeFileSync("cli-utilities/README.md", readme, "utf8");

      - name: Commit README if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README via gpt-5-mini"
          file_pattern: "cli-utilities/README.md"
