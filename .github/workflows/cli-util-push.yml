name: Auto-Update README with GitHub Models

on:
  push:
    branches:
      - main
    paths:
      - "cli-utilities/.zshrc"
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare zshrc content
        shell: bash
        run: |
          set -e
          if [ -f cli-utilities/.zshrc ]; then
            head -c 20000 cli-utilities/.zshrc > zshrc.txt
          else
            echo "No .zshrc found." > zshrc.txt
          fi

      - name: Generate README via GitHub Models
        uses: actions/github-script@v7
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require("fs");

            const zshrc = fs.readFileSync("zshrc.txt", "utf8");

            const prompt =
              "You are documenting zsh utility functions.\n\n" +
              "ZSHRC CONTENT:\n" +
              zshrc +
              "\n\nCreate a COMPLETE README.md containing:\n" +
              "1. Quick start setup\n" +
              "2. Function list with one-line descriptions\n" +
              "3. Usage examples\n" +
              "4. Prerequisites if required\n\n" +
              "Output clean Markdown only.";

            const headers = {};
            headers.Authorization = "Bearer " + process.env.TOKEN;
            headers["Content-Type"] = "application/json";
            headers["X-GitHub-Api-Version"] = "2022-11-28";

            const response = await fetch(
              "https://models.github.ai/inference/chat/completions",
              {
                method: "POST",
                headers: headers,
                body: JSON.stringify({
                  model: "openai/gpt-5-mini",
                  messages: [{ role: "user", content: prompt }],
                  temperature: 0.4,
                  max_tokens: 4096
                })
              }
            );

            const data = await response.json();

            let readme = "# CLI Utilities\n\nREADME generation failed.";

            if (data && data.choices && data.choices.length > 0) {
              readme = data.choices[0].message.content;
            }

            fs.writeFileSync("cli-utilities/README.md", readme);

      - name: Commit README if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update README via GitHub Models"
          file_pattern: "cli-utilities/README.md"
